<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <div class="container">

        <h1>Register</h1>

        <!-- NAME -->

        <input
        type="text"
        id="name"
        placeholder="Enter Name">

        <!-- EMAIL -->

        <input
        type="email"
        id="email"
        placeholder="Enter Email">

        <!-- PASSWORD -->

        <input
        type="password"
        id="password"
        placeholder="Enter Password">

        <!-- PHONE -->

        <input
        type="text"
        id="phone"
        placeholder="Enter Phone Number">

        <!-- BUTTON -->

        <button onclick="registerUser()">

            Register

        </button>

        <!-- LOGIN LINK -->

        <p class="bottom-text">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
